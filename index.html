<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Financiero del Hogar</title>

<style>
body{font-family:Arial;padding:20px;max-width:1000px;margin:auto}
.meses{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.meses button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer;background:#e5e7eb}
.activo{background:#2563eb !important;color:white}
.input-area{display:flex;gap:10px;margin-bottom:20px}
.control-area{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.lista{display:grid;gap:10px}
.gasto{background:white;display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:10px;align-items:center;border:1px solid #ddd;padding:8px;border-radius:8px}
.pagado{background:#fde047}
.total{display:grid;grid-template-columns:1fr 1fr;margin-top:30px;font-size:20px;font-weight:bold}
.bloqueado{display:flex;align-items:center;justify-content:center;height:70vh;font-size:28px}
</style>

</head>

<body>

<h1 style="text-align:center">Panel Financiero del Hogar</h1>

<button onclick="guardarManual()">💾 Guardar Cambios</button>

<div class="meses" id="meses"></div>

<div class="input-area">
<input id="nombre" placeholder="Nuevo gasto">
<input id="monto" type="number" step="0.01" placeholder="Monto">
<button onclick="agregar()">Agregar</button>
</div>

<div class="control-area">
<button onclick="pagarTodo()">Pagar Todo</button>
<button onclick="reiniciarMes()">Reiniciar Mes</button>
</div>

<div class="lista" id="lista"></div>

<div class="total">
<div id="pagado"></div>
<div id="pendiente"></div>
</div>

<script>

const PIN_CORRECTO="1389";
let accesoPermitido=true;

function verificarPIN(){
let intento=prompt("Ingrese el PIN:");

if(intento!==PIN_CORRECTO){
alert("PIN incorrecto");
return verificarPIN();
}

return true;
}

verificarPIN();

const meses=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

const datosBase=[
{id:1,nombre:"Alquiler",monto:1650,pagado:false,fechaPago:""},
{id:2,nombre:"Terreno 3 Viñedos de Ocucaje",monto:589,pagado:false,fechaPago:""},
{id:3,nombre:"UCV Lucy pension",monto:400,pagado:false,fechaPago:""},
{id:4,nombre:"Terreno 4 Puertas de Carhuaz",monto:380,pagado:false,fechaPago:""},
{id:5,nombre:"Terreno 5 Sol de Luna Puerto Malabrigo",monto:362,pagado:false,fechaPago:""},
{id:6,nombre:"Seguros colegios hijos",monto:350,pagado:false,fechaPago:""},
{id:7,nombre:"Terreno 2 Reque",monto:325,pagado:false,fechaPago:""},
{id:8,nombre:"Lucy",monto:200,pagado:false,fechaPago:""},
{id:9,nombre:"Viaje de julio",monto:200,pagado:false,fechaPago:""},
{id:10,nombre:"Terreno 1 San Vicente de Cañete",monto:196,pagado:false,fechaPago:""}
];

function crearEstructura(){

const obj={};

meses.forEach(m=>{
obj[m]=datosBase.map(g=>({...g}));
});

return obj;

}

let data=JSON.parse(localStorage.getItem("finanzasCasa")) || crearEstructura();

let mesActual="Enero";

function guardarManual(){

localStorage.setItem("finanzasCasa",JSON.stringify(data));

alert("Guardado");

}

function renderMeses(){

const cont=document.getElementById("meses");

cont.innerHTML="";

meses.forEach(m=>{

const btn=document.createElement("button");

btn.textContent=m;

if(m===mesActual)btn.classList.add("activo");

btn.onclick=()=>{
mesActual=m;
render();
};

cont.appendChild(btn);

});

}

function agregar(){

const nombre=document.getElementById("nombre").value;

const monto=parseFloat(document.getElementById("monto").value);

data[mesActual].push({

id:Date.now(),
nombre:nombre,
monto:monto,
pagado:false,
fechaPago:""

});

guardarManual();

render();

}

function togglePago(id){

data[mesActual]=data[mesActual].map(g=>{

if(g.id===id){

g.pagado=!g.pagado;

}

return g;

});

guardarManual();

render();

}

function render(){

renderMeses();

const lista=document.getElementById("lista");

lista.innerHTML="";

data[mesActual].forEach(g=>{

const div=document.createElement("div");

div.className="gasto"+(g.pagado?" pagado":"");

div.innerHTML=`

<input value="${g.nombre}">

<input type="number" value="${g.monto}">

<button onclick="togglePago(${g.id})">

${g.pagado?"Pagado":"Pendiente"}

</button>

`;

lista.appendChild(div);

});

const totalPagado=data[mesActual]
.filter(g=>g.pagado)
.reduce((a,b)=>a+b.monto,0);

const totalPendiente=data[mesActual]
.filter(g=>!g.pagado)
.reduce((a,b)=>a+b.monto,0);

document.getElementById("pagado").innerText="Total Pagado S/ "+totalPagado;

document.getElementById("pendiente").innerText="Total Pendiente S/ "+totalPendiente;

}

render();

</script>
