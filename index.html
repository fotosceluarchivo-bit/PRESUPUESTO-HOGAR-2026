<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Panel Financiero del Hogar</title>

<style>

body{
font-family:Arial;
background:#f0f0f0;
padding:20px;
}

h1{
text-align:center;
}

#login{
text-align:center;
margin-top:100px;
}

#panel{
display:none;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 12px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

.pagado{
background:#c8f7c5;
}

.total{
margin-top:20px;
font-size:20px;
font-weight:bold;
text-align:right;
}

</style>

</head>

<body>

<div id="login">

<h1>🔐 Panel Financiero del Hogar</h1>

<input type="password" id="pin" placeholder="Ingrese PIN">

<button onclick="login()">Entrar</button>

<p id="error" style="color:red;"></p>

</div>

<div id="panel">

<h1>💰 Control de Gastos</h1>

<input id="nombre" placeholder="Nuevo gasto">
<input id="monto" type="number" placeholder="Monto">

<button onclick="agregar()">Agregar</button>

<table>

<thead>
<tr>
<th>Concepto</th>
<th>Monto</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<div class="total">

Total pendiente: $<span id="total">0</span>

</div>

</div>

<script>

const PIN="1389";

let gastos=[];

function login(){

let p=document.getElementById("pin").value;

if(p===PIN){

document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";

cargarFirebase();

}else{

document.getElementById("error").innerText="PIN incorrecto";

}

}

function agregar(){

let nombre=document.getElementById("nombre").value;
let monto=parseFloat(document.getElementById("monto").value);

if(!nombre || !monto) return;

guardarEnFirebase(nombre,monto);

document.getElementById("nombre").value="";
document.getElementById("monto").value="";

}

function render(){

let tabla=document.getElementById("tabla");

tabla.innerHTML="";

let total=0;

gastos.forEach((g,i)=>{

if(!g.pagado) total+=g.monto;

tabla.innerHTML+=`

<tr class="${g.pagado?'pagado':''}">

<td>${g.nombre}</td>

<td>$${g.monto}</td>

<td>${g.pagado?'Pagado':'Pendiente'}</td>

<td>

<button onclick="pagar('${g.id}',${g.pagado})">✔</button>

<button onclick="eliminar('${g.id}')">❌</button>

</td>

</tr>

`;

});

document.getElementById("total").innerText=total;

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"TU_API_KEY",
authDomain:"TU_DOMINIO.firebaseapp.com",
projectId:"TU_PROYECTO",
storageBucket:"TU_BUCKET",
messagingSenderId:"XXXX",
appId:"XXXX"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

window.guardarEnFirebase=async function(nombre,monto){

await addDoc(collection(db,"gastos"),{

nombre:nombre,
monto:monto,
pagado:false,
fecha:new Date()

});

cargarFirebase();

}

window.cargarFirebase=async function(){

gastos=[];

const querySnapshot=await getDocs(collection(db,"gastos"));

querySnapshot.forEach((docu)=>{

gastos.push({
id:docu.id,
...docu.data()
});

});

render();

}

window.eliminar=async function(id){

await deleteDoc(doc(db,"gastos",id));

cargarFirebase();

}

window.pagar=async function(id,estado){

await updateDoc(doc(db,"gastos",id),{

pagado:!estado

});

cargarFirebase();

}

</script>

</body>

</html>
