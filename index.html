<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Presupuesto Hogar</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

#login{
text-align:center;
margin-top:100px;
}

#app{
display:none;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 12px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

.pagado{
background:#c8f7c5;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:20px;
text-align:right;
}

</style>

</head>

<body>

<div id="login">

<h1>🔐 Presupuesto Hogar</h1>

<input type="password" id="pin" placeholder="Ingrese PIN">

<button onclick="verificarPin()">Entrar</button>

<p id="error" style="color:red;"></p>

</div>

<div id="app">

<h1>💰 Control de Gastos</h1>

<input id="nombre" placeholder="Concepto">
<input id="monto" type="number" placeholder="Monto">

<button onclick="agregar()">Agregar</button>

<table>

<thead>
<tr>
<th>Concepto</th>
<th>Monto</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<div class="total">
Total: $<span id="total">0</span>
</div>

</div>

<script>

const PIN = "1389";

let data = [];

function verificarPin(){

const pin = document.getElementById("pin").value;

if(pin === PIN){

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

cargar();

}else{

document.getElementById("error").innerText="PIN incorrecto";

}

}

function agregar(){

const nombre = document.getElementById("nombre").value;
const monto = parseFloat(document.getElementById("monto").value);

if(!nombre || !monto) return;

data.push({
nombre:nombre,
monto:monto,
pagado:false
});

guardar();

render();

guardarEnFirebase(nombre,monto);

document.getElementById("nombre").value="";
document.getElementById("monto").value="";

}

function render(){

const tabla = document.getElementById("tabla");

tabla.innerHTML="";

let total=0;

data.forEach((item,i)=>{

if(!item.pagado) total += item.monto;

tabla.innerHTML += `
<tr class="${item.pagado?'pagado':''}">
<td>${item.nombre}</td>
<td>$${item.monto}</td>
<td>${item.pagado?'Pagado':'Pendiente'}</td>
<td>

<button onclick="togglePago(${i})">✔</button>

<button onclick="eliminar(${i})">❌</button>

</td>
</tr>
`;

});

document.getElementById("total").innerText = total;

}

function togglePago(i){

data[i].pagado = !data[i].pagado;

guardar();

render();

}

function eliminar(i){

data.splice(i,1);

guardar();

render();

}

function guardar(){

localStorage.setItem("finanzasCasa",JSON.stringify(data));

}

function cargar(){

const d = localStorage.getItem("finanzasCasa");

if(d){

data = JSON.parse(d);

render();

}

}

</script>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBn-3HhN85uNP8tVS75L-g_uPjwaHeQ_w",

authDomain: "presupuesto-hogar-745dc.firebaseapp.com",

projectId: "presupuesto-hogar-745dc",

storageBucket: "presupuesto-hogar-745dc.firebasestorage.app",

messagingSenderId: "812918967836",

appId: "1:812918967836:web:668c0673904a36288e19d9"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

async function guardarEnFirebase(nombre,monto){

try{

await addDoc(collection(db,"gastos"),{

nombre:nombre,

monto:monto,

fecha:new Date()

});

console.log("Guardado en Firebase");

}catch(e){

console.error("Error:",e);

}

}

window.guardarEnFirebase = guardarEnFirebase;

</script>

</body>
</html>
